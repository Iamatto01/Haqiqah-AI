<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haqiqah AI Verification Tool</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #e5e7eb;
            color: #1f2937;
            margin: 0;
            padding: 3rem 1rem;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            padding: 2.5rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            color: #111827;
            border-bottom: 2px solid #f3f4f6;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #374151;
            font-size: 0.95rem;
        }
        textarea, input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
            background-color: #f9fafb;
        }
        textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: #6b7280;
            background-color: #ffffff;
        }
        textarea {
            height: 120px;
            resize: vertical;
        }
        .file-upload {
            border: 2px dashed #d1d5db;
            padding: 2rem 1rem;
            text-align: center;
            background-color: #f9fafb;
            border-radius: 6px;
            cursor: pointer;
            color: #6b7280;
            transition: background-color 0.2s;
        }
        .file-upload:hover {
            background-color: #f3f4f6;
        }
        #imagePreview {
            max-width: 100%;
            max-height: 250px;
            margin-top: 1rem;
            display: none;
            border-radius: 6px;
            border: 1px solid #e5e7eb;
        }
        button {
            background-color: #4b5563;
            color: white;
            border: none;
            padding: 0.875rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #374151;
        }
        .result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            background-color: #f9fafb;
            display: none;
        }
        .result-box.active {
            display: block;
        }
        .verdict-badge {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            border-radius: 4px;
            font-weight: bold;
            color: white;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }
        .loader {
            display: none;
            text-align: center;
            margin-top: 1.5rem;
            color: #6b7280;
            font-weight: 500;
        }
        .help-text {
            font-size: 0.85rem;
            color: #6b7280;
            margin-top: 0.5rem;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fact Check Tool</h1>
        
        <div class="form-group">
            <label for="claimInput">Text or Link to analyze</label>
            <textarea id="claimInput" placeholder="Paste suspicious text or a news link (e.g., https://example.com/news) here..."></textarea>
        </div>

        <div class="form-group">
            <label>Image Attachment (Optional)</label>
            <div class="file-upload" onclick="document.getElementById('imageInput').click()">
                Click to browse for an image...
                <input type="file" id="imageInput" accept="image/*" style="display: none;">
            </div>
            <img id="imagePreview" alt="Image preview">
            <span class="help-text">Note: The AI currently prioritizes text and links. Image processing is for context.</span>
        </div>

        <button id="verifyBtn">Run Verification</button>
        <div id="loader" class="loader">Analyzing content via local backend...</div>

        <div id="resultBox" class="result-box">
            <div id="verdictBadge" class="verdict-badge"></div>
            <h3 style="margin-top: 0; margin-bottom: 0.5rem; font-size: 1.1rem;">Analysis Report</h3>
            <p id="analysisText" style="line-height: 1.5; color: #4b5563;"></p>
            <div id="claimsList" style="margin-top: 1.5rem;"></div>
        </div>
    </div>

    <script>
        // Image preview logic
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('imagePreview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        });

        // Fact checker logic
        document.getElementById('verifyBtn').addEventListener('click', async () => {
            const inputVal = document.getElementById('claimInput').value.trim();
            if (!inputVal) return alert("Please enter text or a link to verify.");
            
            const btn = document.getElementById('verifyBtn');
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('resultBox');
            
            btn.style.display = 'none';
            loader.style.display = 'block';
            resultBox.classList.remove('active');
            
            // Check if input is a URL
            const isUrl = inputVal.startsWith('http://') || inputVal.startsWith('https://');
            const requestBody = { source: 'web' };
            if (isUrl) {
                requestBody.url = inputVal;
            } else {
                requestBody.text = inputVal;
            }
            
            try {
                const response = await fetch('http://localhost:3000/api/v1/verify-content', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });
                
                const resData = await response.json();
                
                if (resData.success) {
                    const data = resData.data;
                    const tm = data.truthMeter;
                    
                    const badge = document.getElementById('verdictBadge');
                    badge.innerHTML = `${tm.icon} ${tm.label}`;
                    badge.style.backgroundColor = tm.bgColor;
                    // Ensure text is readable on light badges
                    if (tm.bgColor === '#FBBF24' || tm.bgColor === '#FCD34D') {
                        badge.style.color = '#000';
                    } else {
                        badge.style.color = tm.color || '#fff';
                    }
                    
                    document.getElementById('analysisText').textContent = data.analysis.summary;
                    
                    let claimsHtml = '';
                    if (data.claims && data.claims.length > 0) {
                        claimsHtml = '<strong>Extracted Claims:</strong><ul style="margin-top: 0.5rem; padding-left: 1.2rem; color: #4b5563;">';
                        data.claims.forEach(c => {
                            claimsHtml += `<li style="margin-bottom: 0.25rem;">${c.claim}</li>`;
                        });
                        claimsHtml += '</ul>';
                    }
                    document.getElementById('claimsList').innerHTML = claimsHtml;
                    
                    resultBox.classList.add('active');
                } else {
                    alert("Error checking claim. Make sure your local server is running.");
                }
            } catch (err) {
                console.error(err);
                alert("Failed to connect to backend. Is your server running on localhost:3000?");
            } finally {
                btn.style.display = 'block';
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
